<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Eslam Mohamed</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/about.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/blog.css') }}">
</head>
<body>
    <div class="menu">
        <img  width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/menu--v3.png" alt="menu--v3"/>
    </div>
    <header>

        <img class="close" width="24" height="24" src="https://img.icons8.com/material-two-tone/24/delete-sign.png" alt="delete-sign"/>
        
        <div class="avatar">
            <div>
                <img src="/static/images/avatar.png" alt="avatar">
            </div>
            <p class="name">Eslam Mohamed</p>
            <p class="title">Software Engineer</p>
        </div>

        <nav>
            <ul class="elements">
                <li>
                    {% if title == "About" %}
                        <div class="active">
                    {% else %}
                        <div>
                    {% endif %}
                            <a href="/">
                                <img width="20" height="20" src="https://img.icons8.com/ios-filled/50/about.png" alt="about"/>
                                About
                            </a>
                        </div>
                </li>
                <li>
                    {% if title == "Blog" %}
                        <div class="active">
                    {% else %}
                        <div>
                    {% endif %}
                        <a href="/blog">
                            <img width="20" height="20" src="https://img.icons8.com/external-glyph-andi-nur-abdillah/64/external-Blog-digital-nomad-(glyph)-glyph-andi-nur-abdillah.png" alt="external-Blog-digital-nomad-(glyph)-glyph-andi-nur-abdillah"/>
                            Blog
                        </a>
                    </div>
                </li>
            </ul>
        </nav>
        <div>
            <ul class="social">
                <li>
                    <a href="https://www.linkedin.com/in/eslam-mohamed-85a056247/" target="_blank">
                        <img width="25" height="25" src="https://img.icons8.com/ios-glyphs/30/linkedin.png" alt="linkedin"/>
                    
                    </a>
                </li>
                <li>
                    <a href="https://github.com/EslamElnajdy" target="_blank">
                        <img width="25" height="25" src="https://img.icons8.com/ios-glyphs/30/github.png" alt="github"/>
                    </a>
                </li>
                <li>
                    <a href="https://twitter.com/eslam_najdy" target="_blank">
                        <img width="25" height="25" src="https://img.icons8.com/ios-glyphs/30/twitter--v1.png" alt="twitter--v1"/>
                    </a>
                </li>
                <li>
                    <a href="" target="_blank">
                        <img width="25" height="25" src="https://img.icons8.com/material-rounded/24/mail.png" alt="mail"/>
                    </a>
                </li>
            </ul>
        </div>
    </header>

    <div class="helper-css"></div>
    <div class="main">
        <div class="content">
            {% block content %}
            {% endblock %}
        </div>
        <footer>
            <p>&copy; {{ year }} Eslam Mohamed. All rights reserved.</p>
        </footer>
    </div>

    <script src="/static/scripts/base.js"></script>
</body>
</html>
